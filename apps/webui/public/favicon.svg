<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Papyrus">
	<title>Papyrus</title>
	<defs>
		<linearGradient id="parchment" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
			<stop offset="0" stop-color="#EEE3C6"/>
			<stop offset="1" stop-color="#DAC792"/>
		</linearGradient>
		<linearGradient id="ink" x1="0" y1="74" x2="0" y2="438" gradientUnits="userSpaceOnUse">
			<stop offset="0" stop-color="#4A3A24"/>
			<stop offset="1" stop-color="#2C2114"/>
		</linearGradient>
	</defs>
	<!-- Full-bleed parchment tile (favicon shows rounded corners; iOS/Android mask their own) -->
	<rect x="0" y="0" width="512" height="512" rx="104" fill="url(#parchment)"/>
	<!-- Papyrus "P": stem + bowl, drawn as one bold scroll-ink stroke -->
	<path d="M204 411 V101 A104 104 0 0 1 204 309"
		fill="none" stroke="url(#ink)" stroke-width="54"
		stroke-linecap="round" stroke-linejoin="round"/>
</svg>
