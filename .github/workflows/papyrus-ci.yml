name: Papyrus CI

# The server + server-core carry native modules (better-sqlite3, node-pty)
# and Windows-specific paths (named pipe, ConPTY). Those must be verified on
# the OSes Papyrus actually runs on — not just Ubuntu.

on:
  push:
    branches: [main]
    paths:
      - "apps/server/**"
      - "apps/webui/**"
      - "packages/server-core/**"
      - "packages/local-db/**"
      - ".github/workflows/papyrus-ci.yml"
  pull_request:
    types: [opened, synchronize]
    paths:
      - "apps/server/**"
      - "apps/webui/**"
      - "packages/server-core/**"
      - "packages/local-db/**"

jobs:
  server:
    name: Server (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      # The daemon and server run under Node (bun cannot load better-sqlite3
      # on Windows and breaks node-pty's conin socket) — see PLAN_MAIN D5.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # --ignore-scripts skips the root postinstall (Electron-only,
      # ./scripts/postinstall.sh, not runnable on Windows). node-pty ships
      # prebuilds for every runner platform (resolved at require time), so no
      # native build step is needed; better-sqlite3 is externalized by the
      # server bundle and mocked in the tests, so its binding isn't required.
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Typecheck server-core
        run: bun run --cwd packages/server-core typecheck

      - name: Typecheck server
        run: bun run --cwd apps/server typecheck

      - name: Test server-core
        run: bun run --cwd packages/server-core test

      - name: Build server bundle
        run: bun run --cwd apps/server build

      - name: Build web UI
        run: bun run --cwd apps/webui build
        env:
          # The SPA bundles Monaco + xterm + mermaid + the full renderer; the
          # default heap OOMs on the runners (the desktop uses the same bump).
          NODE_OPTIONS: --max-old-space-size=6144
